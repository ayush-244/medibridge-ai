services:
  mongo:
    image: mongo:7
    container_name: medibridge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: node:20-alpine
    container_name: medibridge-server
    working_dir: /app
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      MONGODB_URI: mongodb://mongo:27017/medibridge
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AI_SERVICE_URL: http://ai-service:8000/api/ai
    depends_on:
      mongo:
        condition: service_healthy

  ai-service:
    image: python:3.11-slim
    container_name: medibridge-ai-service
    working_dir: /app
    volumes:
      - ./ai-service:/app
      - ai_chroma_data:/app/chroma_db
      - ai_uploads:/app/app/uploads
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-chat-v3}
      NODE_API_BASE_URL: http://server:5000/api
    depends_on:
      - server

  client:
    image: node:20-alpine
    container_name: medibridge-client
    working_dir: /app
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_AI_URL: http://localhost:8000/api/ai
      VITE_SOCKET_URL: http://localhost:5000
      VITE_OPENROUTESERVICE_API_KEY: ${VITE_OPENROUTESERVICE_API_KEY:-}
    depends_on:
      - server
      - ai-service

volumes:
  mongo_data:
  server_node_modules:
  client_node_modules:
  ai_chroma_data:
  ai_uploads:
